<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBook - Professional Review System</title>
    
    <!-- Alternative high-availability fallback CDN link for Tailwind CSS -->
    <link rel="stylesheet" href="https://cloudflare.com" integrity="sha512-wnea99cKJUeWc45oIpC3e8E7MHBjInVJcAK3AFl6b3bERqm8oFQW7M1868W48gRn4w28v78c7RxTRKsUp761nw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        /* Bold, crisp, completely opaque background image */
        .bg-custom-image {
            background-image: url('https://png.pngtree.com/thumb_back/fh260/background/20220321/pngtree-old-books-hardcover-ancient-brown-photo-image_16778672.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
    </style>
</head>

<body class="bg-custom-image text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Modern Header Navigation -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 shadow-xs">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-3xl">📚</span>
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r coding-gradient from-blue-600 to-indigo-600 bg-clip-text text-transparent">
                    OpenBook Reviews
                </h1>
            </div>
            <div class="flex items-center space-x-2">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200">
                    <span class="w-1.5 h-1.5 mr-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    Azure Active
                </span>
            </div>
        </div>
    </header>

    <!-- Main Responsive Dashboard Grid Layout -->
    <main class="max-w-6xl w-full mx-auto p-6 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8 flex-1">
        
        <!-- Left Side: Form Container -->
        <section class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200/80 lg:sticky lg:top-24">
                <h2 class="text-lg font-bold mb-1 text-slate-900">Add a Book Review</h2>
                <p class="text-xs text-slate-500 mb-5">Share your thoughts with the reader community.</p>
                
                <form id="reviewForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Book Title</label>
                        <input type="text" id="title" required placeholder="e.g., The Midnight Library" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Author</label>
                        <input type="text" id="author" required placeholder="e.g., Matt Haig" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Rating Score</label>
                        <div class="relative">
                            <select id="rating" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm appearance-none cursor-pointer">
                                <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
                                <option value="4">⭐⭐⭐⭐ (4/5)</option>
                                <option value="3">⭐⭐⭐ (3/5)</option>
                                <option value="2">⭐⭐ (2/5)</option>
                                <option value="1">⭐ (1/5)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wider mb-1.5">Your Review Summary</label>
                        <textarea id="reviewText" rows="4" required placeholder="What did you think about the characters, plot, and pacing?" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm resize-none"></textarea>
                    </div>
                    <button type="submit" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-2.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all active:scale-[0.98] text-sm tracking-wide">
                        Publish Review
                    </button>
                </form>
            </div>
        </section>

        <!-- Right Side: Reviews Live Stream Feed -->
        <section class="lg:col-span-2 flex flex-col">
            <div class="flex items-center justify-between mb-5">
                <div>
                    <h2 class="text-lg font-bold text-slate-900">Latest Reader Reviews</h2>
                    <p class="text-xs text-slate-500">Real-time updates directly from the cloud backend.</p>
                </div>
                <button id="refreshBtn" class="inline-flex items-center px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors border border-blue-100">
                    <span class="mr-1">🔄</span> Refresh Feed
                </button>
            </div>
            
            <div id="reviewsContainer" class="space-y-4">
                <!-- Data will inject here dynamically -->
                <div class="p-8 bg-white rounded-2xl border border-slate-200/80 text-center text-slate-400 text-sm">
                    Loading book reviews database stream...
                </div>
            </div>
        </section>
    </main>

    <!-- Unified JavaScript Logic Connection -->
    <script>
        const API_URL = '/api/reviews';

        let localFallbackReviews = [
            { id: 1, title: "The Hobbit", author: "J.R.R. Tolkien", rating: 5, text: "An absolute masterpiece of fantasy literature. Perfect pacing, wonderful character development, and timeless themes." },
            { id: 2, title: "Atomic Habits", author: "James Clear", rating: 4, text: "Very actionable advice on building good routines and breaking bad ones. Highly recommended for personal productivity." }
        ];

        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const reviewData = {
                title: document.getElementById('title').value,
                author: document.getElementById('author').value,
                rating: parseInt(document.getElementById('rating').value),
                text: document.getElementById('reviewText').value,
                date: new Date().toLocaleDateString()
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(reviewData)
                });
                
                if (response.ok) {
                    document.getElementById('reviewForm').reset();
                    fetchReviews();
                } else {
                    throw new Error();
                }
            } catch (error) {
                console.warn("Backend API offline. Running safe fallback loop.");
                reviewData.id = Date.now();
                localFallbackReviews.unshift(reviewData);
                document.getElementById('reviewForm').reset();
                renderReviews(localFallbackReviews);
            }
        });

        async function fetchReviews() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error();
                const data = await response.json();
                renderReviews(data);
            } catch (error) {
                renderReviews(localFallbackReviews);
            }
        }

        function renderReviews(reviews) {
            const container = document.getElementById('reviewsContainer');
            if (reviews.length === 0) {
                container.innerHTML = `
                    <div class="p-8 bg-white rounded-2xl border border-slate-200 text-center text-slate-400 text-sm">
                        No reviews posted yet. Be the first contributor!
                    </div>`;
                return;
            }
            
            container.innerHTML = reviews.map(r => `
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-xs hover:shadow-md hover:border-slate-200 transition-all duration-200">
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <h3 class="text-base font-bold text-slate-900">${escapeHtml(r.title)}</h3>
                            <p class="text-xs text-slate-500 mt-0.5">by <span class="font-medium text-slate-700">${escapeHtml(r.author)}</span></p>
                        </div>
                        <div class="text-amber-500 tracking-tight text-sm select-none shrink-0 bg-amber-50/60 px-2 py-0.5 rounded-md border border-amber-100/50">
                            ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                        </div>
                    </div>
                    <div class="h-px bg-slate-100 my-3.5"></div>
                    <p class="text-sm text-slate-600 leading-relaxed whitespace-pre-line">${escapeHtml(r.text)}</p>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
return str.replace(/&/g, "&").replace(/</g, "<").replace(/>/g, ">").replace(/"/g, """).replace(/'/g, "'");
}
document.getElementById('refreshBtn').addEventListener('click', fetchReviews);
window.addEventListener('DOMContentLoaded', fetchReviews);
